<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" fill="#1e293b" font-size="16" font-weight="700">Security Scenario — MCU vs SBC Timeline Comparison</text>

  <!-- ===== LEFT: RP2350 (MCU) ===== -->
  <rect x="30" y="55" width="400" height="440" rx="14" fill="#f0fdf4" filter="url(#shadow)"/>
  <rect x="30" y="55" width="400" height="440" rx="14" fill="none" stroke="#86efac" stroke-width="1.5"/>
  <text x="230" y="82" text-anchor="middle" fill="#15803d" font-size="14" font-weight="700">RP2350 (MCU) — bare-metal</text>

  <!-- Timeline bar -->
  <rect x="70" y="100" width="8" height="370" rx="4" fill="#dcfce7"/>

  <!-- 0.0s D1 -->
  <circle cx="74" cy="115" r="7" fill="#7c3aed"/>
  <text x="94" y="112" fill="#1e293b" font-size="11" font-weight="700">0.0 s</text>
  <text x="94" y="128" fill="#475569" font-size="10">D1: Glass break detected → UART event</text>

  <!-- 0.0s RP2350 -->
  <circle cx="74" cy="160" r="7" fill="#0284c7"/>
  <text x="94" y="157" fill="#1e293b" font-size="11" font-weight="700">0.0 s</text>
  <text x="94" y="173" fill="#475569" font-size="10">RP2350: IRQ received, I2S RX DMA starts</text>

  <!-- 0.3s Opus -->
  <circle cx="74" cy="205" r="7" fill="#059669"/>
  <text x="94" y="202" fill="#1e293b" font-size="11" font-weight="700">0.3 s</text>
  <text x="94" y="218" fill="#475569" font-size="10">Opus encode starts, first frame → SPSC ring</text>

  <!-- 1.5s Wi-Fi -->
  <circle cx="74" cy="250" r="7" fill="#d97706"/>
  <text x="94" y="247" fill="#1e293b" font-size="11" font-weight="700">1.5 s</text>
  <text x="94" y="263" fill="#475569" font-size="10">Wi-Fi association complete</text>

  <!-- 1.8s TLS -->
  <circle cx="74" cy="290" r="7" fill="#d97706"/>
  <text x="94" y="287" fill="#1e293b" font-size="11" font-weight="700">1.8 s</text>
  <text x="94" y="303" fill="#475569" font-size="10">TLS handshake complete</text>

  <!-- 2.0s Cloud arrival - SUCCESS -->
  <circle cx="74" cy="338" r="9" fill="#16a34a"/>
  <rect x="88" y="322" width="320" height="36" rx="8" fill="#dcfce7"/>
  <rect x="88" y="322" width="320" height="36" rx="8" fill="none" stroke="#4ade80" stroke-width="1.5"/>
  <text x="248" y="338" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">2.0 s  Audio evidence delivered to cloud</text>
  <text x="248" y="353" text-anchor="middle" fill="#16a34a" font-size="10" font-weight="600">Evidence is already in the cloud</text>

  <!-- 3.0s notice -->
  <circle cx="74" cy="390" r="5" fill="#94a3b8"/>
  <text x="94" y="387" fill="#64748b" font-size="11">3.0 s</text>
  <text x="94" y="403" fill="#64748b" font-size="10">Intruder notices the device</text>

  <!-- 5.0s destroy -->
  <circle cx="74" cy="435" r="5" fill="#dc2626"/>
  <text x="94" y="432" fill="#dc2626" font-size="11" font-weight="600">5.0 s</text>
  <text x="94" y="448" fill="#dc2626" font-size="10">Intruder destroys the device</text>
  <text x="94" y="465" fill="#15803d" font-size="11" font-weight="700">→ Too late. Audio is already in the cloud.</text>

  <!-- ===== RIGHT: Raspberry Pi (SBC) ===== -->
  <rect x="450" y="55" width="400" height="440" rx="14" fill="#fef2f2" filter="url(#shadow)"/>
  <rect x="450" y="55" width="400" height="440" rx="14" fill="none" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="650" y="82" text-anchor="middle" fill="#991b1b" font-size="14" font-weight="700">Raspberry Pi (SBC) — Linux</text>

  <!-- Timeline bar -->
  <rect x="490" y="100" width="8" height="370" rx="4" fill="#fee2e2"/>

  <!-- 0.0s glass -->
  <circle cx="494" cy="115" r="7" fill="#7c3aed"/>
  <text x="514" y="112" fill="#1e293b" font-size="11" font-weight="700">0.0 s</text>
  <text x="514" y="128" fill="#475569" font-size="10">Glass break sound</text>

  <!-- 0.0s boot -->
  <circle cx="494" cy="160" r="7" fill="#94a3b8"/>
  <text x="514" y="157" fill="#1e293b" font-size="11" font-weight="700">0.0 s</text>
  <text x="514" y="173" fill="#475569" font-size="10">Linux boot starting...</text>

  <!-- 15s kernel -->
  <circle cx="494" cy="215" r="5" fill="#94a3b8"/>
  <text x="514" y="212" fill="#64748b" font-size="11">15.0 s</text>
  <text x="514" y="228" fill="#64748b" font-size="10">Kernel boot complete</text>

  <!-- 25s systemd -->
  <circle cx="494" cy="265" r="5" fill="#94a3b8"/>
  <text x="514" y="262" fill="#64748b" font-size="11">25.0 s</text>
  <text x="514" y="278" fill="#64748b" font-size="10">systemd services starting...</text>

  <!-- 30s Wi-Fi -->
  <circle cx="494" cy="310" r="5" fill="#94a3b8"/>
  <text x="514" y="307" fill="#64748b" font-size="11">30.0 s</text>
  <text x="514" y="323" fill="#64748b" font-size="10">Wi-Fi connecting...</text>

  <!-- FAILURE box -->
  <rect x="478" y="348" width="350" height="60" rx="8" fill="#fee2e2"/>
  <rect x="478" y="348" width="350" height="60" rx="8" fill="none" stroke="#f87171" stroke-width="1.5"/>
  <text x="653" y="370" text-anchor="middle" fill="#991b1b" font-size="12" font-weight="700">Intruder has already destroyed the device</text>
  <text x="653" y="388" text-anchor="middle" fill="#b91c1c" font-size="10">SD card removed</text>
  <text x="653" y="403" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="700">Nothing was transmitted</text>

  <!-- X marks -->
  <text x="494" y="450" fill="#dc2626" font-size="28" font-weight="700" text-anchor="middle">✕</text>
  <text x="514" y="448" fill="#991b1b" font-size="10">SSH attack surface / SD card theft risk</text>
  <text x="514" y="464" fill="#991b1b" font-size="10">OS vulnerabilities / filesystem dependency</text>
</svg>