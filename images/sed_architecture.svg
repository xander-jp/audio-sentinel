<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="deviceGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="d1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="rpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="core0Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="core1Grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="micGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="spkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="lcdGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="phoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="540" rx="12" fill="url(#bgGrad)"/>

  <!-- Device enclosure -->
  <rect x="30" y="25" width="620" height="490" rx="16" fill="url(#deviceGrad)" filter="url(#shadow)"/>
  <rect x="30" y="25" width="620" height="490" rx="16" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="340" y="58" text-anchor="middle" fill="#1e293b" font-size="17" font-weight="700" letter-spacing="2">Audio Sentinel</text>
  <rect x="240" y="66" width="200" height="1" fill="#94a3b8"/>

  <!-- D1 SED Module -->
  <rect x="50" y="90" width="170" height="150" rx="12" fill="url(#d1Grad)" filter="url(#shadow)"/>
  <text x="135" y="118" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">D1 SED Module</text>
  <rect x="68" y="130" width="134" height="1" fill="#a78bfa" opacity="0.5"/>
  <text x="135" y="152" text-anchor="middle" fill="#e9d5ff" font-size="10">Sound Event Detection</text>
  <text x="135" y="175" text-anchor="middle" fill="#ede9fe" font-size="10">内蔵 MIC + AI (edge)</text>
  <text x="135" y="228" text-anchor="middle" fill="#fef08a" font-size="9" font-weight="600">常時リスニング ∙ mW オーダー</text>

  <!-- UART arrow D1 → RP2350 -->
  <line x1="220" y1="165" x2="300" y2="165" stroke="#b45309" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="300,160 312,165 300,170" fill="#b45309"/>
  <text x="260" y="155" text-anchor="middle" fill="#92400e" font-size="9" font-weight="600">UART</text>
  <text x="260" y="180" text-anchor="middle" fill="#475569" font-size="8">event + confidence</text>

  <!-- RP2350 main box -->
  <rect x="315" y="80" width="320" height="280" rx="12" fill="url(#rpGrad)" filter="url(#shadow)"/>
  <text x="475" y="108" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">RP2350 (Pico 2 W)</text>
  <rect x="350" y="116" width="250" height="1" fill="#7dd3fc" opacity="0.4"/>
  <text x="475" y="134" text-anchor="middle" fill="#e0f2fe" font-size="9">bare-metal ∙ cold boot ~2 秒 ∙ 攻撃面ゼロ</text>

  <!-- Core 0 -->
  <rect x="335" y="148" width="145" height="120" rx="10" fill="url(#core0Grad)" filter="url(#shadow)"/>
  <text x="407" y="170" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Core 0</text>
  <text x="407" y="188" text-anchor="middle" fill="#d1fae5" font-size="9">Audio / UI</text>
  <text x="407" y="204" text-anchor="middle" fill="#d1fae5" font-size="9">Opus Encode / Decode</text>
  <text x="407" y="220" text-anchor="middle" fill="#d1fae5" font-size="9">UART RX Parse</text>
  <text x="407" y="250" text-anchor="middle" fill="#ecfdf5" font-size="8" font-weight="600">20 KB stack</text>

  <!-- Core 1 -->
  <rect x="502" y="148" width="118" height="120" rx="10" fill="url(#core1Grad)" filter="url(#shadow)"/>
  <text x="561" y="170" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Core 1</text>
  <text x="561" y="188" text-anchor="middle" fill="#fef3c7" font-size="9">Network</text>
  <text x="561" y="204" text-anchor="middle" fill="#fef3c7" font-size="9">TLS / Wi-Fi</text>
  <text x="561" y="220" text-anchor="middle" fill="#fef3c7" font-size="9">cyw43_arch_poll</text>
  <text x="561" y="250" text-anchor="middle" fill="#fffbeb" font-size="8" font-weight="600">4 KB stack</text>

  <!-- SPSC ring arrow -->
  <line x1="480" y1="205" x2="502" y2="205" stroke="#fbbf24" stroke-width="2"/>
  <polygon points="499,201 507,205 499,209" fill="#fbbf24"/>
  <text x="491" y="195" text-anchor="middle" fill="#fef3c7" font-size="7" font-weight="600">SPSC</text>
  <text x="491" y="218" text-anchor="middle" fill="#fef3c7" font-size="7" font-weight="600">ring</text>

  <!-- DMA label below cores -->
  <rect x="340" y="280" width="285" height="42" rx="8" fill="#0c4a6e" opacity="0.7"/>
  <text x="482" y="296" text-anchor="middle" fill="#e0f2fe" font-size="9">I2S RX DMA → Opus encode → SPSC ring → TLS POST</text>
  <text x="482" y="312" text-anchor="middle" fill="#7dd3fc" font-size="8" font-weight="600">イベント検知時のみ稼働 ∙ Opus 16 kbps (PCM 比 93.75% 削減)</text>

  <!-- INMP441 -->
  <rect x="50" y="270" width="170" height="60" rx="12" fill="url(#micGrad)" filter="url(#shadow)"/>
  <text x="135" y="296" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">INMP441</text>
  <text x="135" y="314" text-anchor="middle" fill="#fecaca" font-size="9">MEMS MIC (Audio In)</text>

  <!-- I2S RX arrow MIC → RP2350 -->
  <line x1="220" y1="295" x2="333" y2="240" stroke="#ef4444" stroke-width="2"/>
  <polygon points="329,235 339,240 331,246" fill="#ef4444"/>
  <text x="268" y="255" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="600">I2S RX</text>

  <!-- PCM5101A DAC + Speaker -->
  <rect x="50" y="345" width="170" height="60" rx="12" fill="url(#spkGrad)" filter="url(#shadow)"/>
  <text x="135" y="371" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">PCM5101A + Speaker</text>
  <text x="135" y="389" text-anchor="middle" fill="#cffafe" font-size="9">DAC (Audio Out / トークバック)</text>

  <!-- I2S TX arrow RP2350 → DAC -->
  <line x1="333" y1="310" x2="220" y2="365" stroke="#06b6d4" stroke-width="2"/>
  <polygon points="224,361 214,365 222,371" fill="#06b6d4"/>
  <text x="268" y="330" text-anchor="middle" fill="#0e7490" font-size="9" font-weight="600">I2S TX</text>

  <!-- LCD -->
  <rect x="50" y="420" width="170" height="30" rx="8" fill="url(#lcdGrad)" filter="url(#shadow)"/>
  <text x="135" y="440" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">ST7789 LCD (optional)</text>

  <!-- SPI arrow LCD → RP2350 -->
  <line x1="220" y1="432" x2="333" y2="345" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="329,340 339,345 331,351" fill="#818cf8"/>
  <text x="268" y="382" text-anchor="middle" fill="#4338ca" font-size="9">SPI</text>

  <!-- Wi-Fi arrow right from RP2350 → Cloud -->
  <line x1="635" y1="210" x2="690" y2="210" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="687,204 700,210 687,216" fill="#3b82f6"/>
  <!-- Wi-Fi return arrow Cloud → RP2350 -->
  <line x1="690" y1="225" x2="635" y2="225" stroke="#3b82f6" stroke-width="2.5"/>
  <polygon points="638,219 625,225 638,231" fill="#3b82f6"/>
  <text x="662" y="200" text-anchor="middle" fill="#1e40af" font-size="9" font-weight="600">Wi-Fi</text>
  <text x="662" y="244" text-anchor="middle" fill="#475569" font-size="8">上り: Opus + event</text>
  <text x="662" y="256" text-anchor="middle" fill="#475569" font-size="8">下り: Opus (トークバック)</text>

  <!-- Cloud -->
  <rect x="705" y="150" width="220" height="70" rx="16" fill="url(#cloudGrad)" filter="url(#shadow)"/>
  <text x="815" y="180" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Cloud</text>
  <text x="815" y="202" text-anchor="middle" fill="#dbeafe" font-size="9">relay + storage (GPU/CDN 不要)</text>

  <!-- Arrow Cloud → Phone -->
  <line x1="815" y1="220" x2="815" y2="270" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="809,267 815,280 821,267" fill="#22c55e"/>

  <!-- Phone notification -->
  <rect x="705" y="285" width="220" height="50" rx="12" fill="url(#phoneGrad)" filter="url(#shadow)"/>
  <text x="815" y="307" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">スマホ通知 + トークバック</text>
  <text x="815" y="325" text-anchor="middle" fill="#dcfce7" font-size="9">「ガラス破壊音を検知」→ 音声で応答</text>

  <!-- Timeline callout -->
  <rect x="705" y="370" width="220" height="120" rx="10" fill="#f8fafc" filter="url(#shadow)"/>
  <rect x="705" y="370" width="220" height="120" rx="10" fill="none" stroke="#cbd5e1" stroke-width="1"/>
  <text x="815" y="392" text-anchor="middle" fill="#b45309" font-size="10" font-weight="700">タイムライン</text>
  <text x="815" y="412" text-anchor="middle" fill="#334155" font-size="9">0.0s  D1 検知</text>
  <text x="815" y="427" text-anchor="middle" fill="#334155" font-size="9">0.3s  Opus 開始</text>
  <text x="815" y="442" text-anchor="middle" fill="#334155" font-size="9">1.8s  TLS 確立</text>
  <text x="815" y="457" text-anchor="middle" fill="#15803d" font-size="9" font-weight="700">2.0s  証拠クラウド到達</text>
  <text x="815" y="475" text-anchor="middle" fill="#dc2626" font-size="9">5.0s  デバイス破壊 → もう遅い</text>
</svg>