<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="system-ui, -apple-system, sans-serif" font-size="13">

  <!-- Background -->
  <rect width="860" height="420" fill="#fafafa" rx="10"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#111">Cost Structure Comparison</text>

  <!-- ================================================================== -->
  <!-- Traditional (left) -->
  <!-- ================================================================== -->
  <rect x="40" y="60" width="370" height="340" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="225" y="90" text-anchor="middle" font-size="17" font-weight="bold" fill="#991b1b">Traditional Voice Delivery</text>

  <!-- Rows -->
  <text x="65" y="125" font-size="12" font-weight="bold" fill="#64748b">Server</text>
  <rect x="150" y="110" width="240" height="26" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="270" y="128" text-anchor="middle" font-size="13" fill="#7f1d1d">GPU + CDN + Kubernetes</text>

  <text x="65" y="160" font-size="12" font-weight="bold" fill="#64748b">Endpoint</text>
  <rect x="150" y="145" width="240" height="26" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="270" y="163" text-anchor="middle" font-size="13" fill="#7f1d1d">Smartphone / PC</text>

  <text x="65" y="195" font-size="12" font-weight="bold" fill="#64748b">Connect</text>
  <rect x="150" y="180" width="240" height="26" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="270" y="198" text-anchor="middle" font-size="13" fill="#7f1d1d">App required</text>

  <text x="65" y="230" font-size="12" font-weight="bold" fill="#64748b">Bandwidth</text>
  <rect x="150" y="215" width="240" height="26" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="270" y="233" text-anchor="middle" font-size="13" fill="#7f1d1d">High (PCM / AAC stream)</text>

  <text x="65" y="265" font-size="12" font-weight="bold" fill="#64748b">Ops</text>
  <rect x="150" y="250" width="240" height="26" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="270" y="268" text-anchor="middle" font-size="13" fill="#7f1d1d">Expensive / Hard to scale</text>

  <!-- Cost bar -->
  <rect x="65" y="310" width="320" height="36" rx="18" fill="#dc2626"/>
  <text x="225" y="334" text-anchor="middle" font-size="16" font-weight="bold" fill="white">$$$$</text>

  <text x="225" y="375" text-anchor="middle" font-size="12" fill="#991b1b">High Cost / Centralized / Scale-limited</text>

  <!-- ================================================================== -->
  <!-- CloseCast (right) -->
  <!-- ================================================================== -->
  <rect x="450" y="60" width="370" height="340" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="635" y="90" text-anchor="middle" font-size="17" font-weight="bold" fill="#166534">CloseCast</text>

  <!-- Rows -->
  <text x="475" y="125" font-size="12" font-weight="bold" fill="#64748b">Server</text>
  <rect x="560" y="110" width="240" height="26" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="680" y="128" text-anchor="middle" font-size="13" fill="#14532d">register + relay only</text>

  <text x="475" y="160" font-size="12" font-weight="bold" fill="#64748b">Endpoint</text>
  <rect x="560" y="145" width="240" height="26" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="680" y="163" text-anchor="middle" font-size="13" fill="#14532d">MCU + Speaker ($7)</text>

  <text x="475" y="195" font-size="12" font-weight="bold" fill="#64748b">Connect</text>
  <rect x="560" y="180" width="240" height="26" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="680" y="198" text-anchor="middle" font-size="13" fill="#14532d">WiFi direct (TLS)</text>

  <text x="475" y="230" font-size="12" font-weight="bold" fill="#64748b">Bandwidth</text>
  <rect x="560" y="215" width="240" height="26" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="680" y="233" text-anchor="middle" font-size="13" fill="#14532d">Low (Opus 16-24 kbps)</text>

  <text x="475" y="265" font-size="12" font-weight="bold" fill="#64748b">Ops</text>
  <rect x="560" y="250" width="240" height="26" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="680" y="268" text-anchor="middle" font-size="13" fill="#14532d">BLE provision only</text>

  <!-- Cost bar -->
  <rect x="655" y="310" width="80" height="36" rx="18" fill="#16a34a"/>
  <text x="695" y="334" text-anchor="middle" font-size="16" font-weight="bold" fill="white">$</text>

  <text x="635" y="375" text-anchor="middle" font-size="12" fill="#166534">Low Cost / Distributed / Linear Scale</text>
</svg>
